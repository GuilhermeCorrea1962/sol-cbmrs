###############################################################################
# nginx.conf -- SOL CBM-RS
# Versao: Sprint F1
#
# Topologia:
#   Porta 80  -> Angular SPA (dist/sol-frontend/browser)
#   /api/*    -> Spring Boot :8080
#   Keycloak  -> acessado diretamente pelo browser em :8180 (sem proxy)
#
# Para recarregar sem reiniciar o servico:
#   nginx -s reload       (se executado como processo)
#   nssm restart SOL-Nginx (se executado como servico Windows)
###############################################################################

worker_processes  1;

error_log  C:/SOL/logs/nginx-error.log  warn;
pid        C:/SOL/logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';

    access_log  C:/SOL/logs/nginx-access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Limite de upload para plantas e documentos tecnicos (50 MB)
    client_max_body_size 50M;

    # -------------------------------------------------------------------------
    # Upstream: SOL Backend (Spring Boot)
    # -------------------------------------------------------------------------
    upstream sol_backend {
        server 127.0.0.1:8080;
        keepalive 16;
    }

    # -------------------------------------------------------------------------
    # Servidor principal: porta 80
    # -------------------------------------------------------------------------
    server {
        listen       80;
        server_name  localhost;

        # Arquivos estaticos do Angular (build de producao)
        root   C:/SOL/frontend/dist/sol-frontend/browser;
        index  index.html;

        # Angular Router (HTML5 mode): qualquer rota nao encontrada nos
        # arquivos estaticos e servida pelo index.html para o router Angular
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API Backend: proxy reverso para Spring Boot
        location /api/ {
            proxy_pass         http://sol_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Authorization     $http_authorization;
            proxy_pass_header  Authorization;
            proxy_connect_timeout  60s;
            proxy_send_timeout     60s;
            proxy_read_timeout    120s;
        }

        # Arquivos estaticos: cache longo para assets com hash no nome
        location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Seguranca: ocultar versao do Nginx
        server_tokens off;

        # Headers de seguranca HTTP
        add_header X-Frame-Options         "SAMEORIGIN"              always;
        add_header X-Content-Type-Options  "nosniff"                 always;
        add_header Referrer-Policy         "no-referrer-when-downgrade" always;

        # Paginas de erro: exibir SPA (Angular trata o erro de rota)
        error_page 404              /index.html;
        error_page 500 502 503 504  /index.html;
    }
}
